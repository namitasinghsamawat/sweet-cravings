<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sweet Cravings</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6A4E23, #3C2F20);
      /* Darker brown gradient */
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      color: #fff;
    }

    .login-container {
      background: rgba(202, 197, 197, 0.95);
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #3C2F20;
    }

    .form-label {
      font-size: 14px;
      color: #3C2F20;
    }

    .form-control {
      background: #F5F0E1;
      border: 1px solid #D1A25B;
      color: #3C2F20;
    }

    .form-control:focus {
      border-color: #6A4E23;
      box-shadow: 0 0 5px rgba(106, 78, 35, 0.5);
    }

    .form-control::placeholder {
      color: #3C2F20;
    }

    .btn-primary {
      background-color: #6A4E23;
      border: none;
      padding: 10px 20px;
      width: 100%;
      margin-top: 15px;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .btn-primary:hover {
      background-color: #8D7043;
    }

    .form-check-label {
      font-size: 14px;
      color: #3C2F20;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #3C2F20;
    }

    .login-footer a {
      color: #6A4E23;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .alert {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Login</h2>
    <div id="error-message" class="alert alert-danger" style="display:none;"></div>
    <form action="login.php" method="POST" id="login-form">
      <div class="form-group mb-3">
        <input type="email" class="form-control" id="email" name="email" required />
        <label for="email" class="form-label">Email address</label>
      </div>

      <div class="form-group mb-3">
        <input type="password" class="form-control" id="password" name="password" required />
        <label for="password" class="form-label">Password</label>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe"/>
        <label class="form-check-label" for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
