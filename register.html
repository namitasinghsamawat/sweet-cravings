<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Sweet Cravings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6A4E23, #3C2F20);
      /* Darker brown gradient */
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      color: #fff;
    }

    .register-container {
      background: rgba(202, 197, 197, 0.95);
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .register-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #3C2F20;
    }

    .form-label {
      font-size: 14px;
      color: #3C2F20;
    }

    .form-control {
      background: #F5F0E1;
      border: 1px solid #D1A25B;
      color: #3C2F20;
    }

    .form-control:focus {
      border-color: #6A4E23;
      box-shadow: 0 0 5px rgba(106, 78, 35, 0.5);
    }

    .form-control::placeholder {
      color: #3C2F20;
    }

    .btn-primary {
      background-color: #6A4E23;
      border: none;
      padding: 10px 20px;
      width: 100%;
      margin-top: 15px;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .btn-primary:hover {
      background-color: #8D7043;
    }

    .form-check-label {
      font-size: 14px;
      color: #3C2F20;
    }

    .register-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #3C2F20;
    }

    .register-footer a {
      color: #6A4E23;
      text-decoration: none;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .alert {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="register-container">
    <h2>Register</h2>
    <div id="error-message" class="alert alert-danger" style="display:none;"></div>
    <form action="register.php" method="POST" id="register-form">
  <div class="form-group mb-3">
    <input type="text" class="form-control" id="name" name="name" required />
    <label for="name" class="form-label">Full Name</label>
  </div>

  <div class="form-group mb-3">
    <input type="email" class="form-control" id="email" name="email" required />
    <label for="email" class="form-label">Email address</label>
  </div>

  <div class="form-group mb-3">
    <input type="password" class="form-control" id="password" name="password" required />
    <label for="password" class="form-label">Password</label>
  </div>

  <div class="form-group mb-3">
    <input type="password" class="form-control" id="confirm-password" name="confirm-password" required />
    <label for="confirm-password" class="form-label">Confirm Password</label>
  </div>

  <button type="submit" class="btn btn-primary">Register</button>
</form>


    <div class="register-footer">
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
